<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход | Учет платежей</title>
  <style>
    :root {
      --bg: #f3f5f9;
      --surface: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #dde3ec;
      --primary: #1f4d8f;
      --primary-hover: #183d73;
      --error-bg: #fdeef0;
      --error-border: #f4c4cb;
      --success-bg: #eaf9ef;
      --success-border: #bfe7cd;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(180deg, #eef2f9 0%, var(--bg) 240px);
      font-family: "Segoe UI", Arial, sans-serif;
      color: var(--text);
      padding: 16px;
    }

    .card {
      width: min(420px, 100%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 10px 24px rgba(17, 24, 39, 0.08);
    }

    h1 {
      margin: 0 0 6px;
      font-size: 24px;
    }

    .sub {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin: 10px 0 6px;
      font-weight: 600;
    }

    input, button {
      width: 100%;
      border-radius: 10px;
      border: 1px solid #cbd5e1;
      padding: 10px 12px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #6ea0ea;
      box-shadow: 0 0 0 3px rgba(110, 160, 234, 0.22);
    }

    button {
      margin-top: 14px;
      border: none;
      cursor: pointer;
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    button:hover { background: var(--primary-hover); }

    .ok, .err {
      padding: 10px 12px;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 14px;
      border: 1px solid;
    }

    .ok { background: var(--success-bg); border-color: var(--success-border); }
    .err { background: var(--error-bg); border-color: var(--error-border); }
  </style>
</head>
<body>
  <div class="card">
    <h1>Вход</h1>
    <p class="sub">Введите логин и пароль для доступа к приложению.</p>

    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% if msgs %}
        {% for category, msg in msgs %}
          <div class="{{ 'ok' if category == 'success' else 'err' }}">{{ msg }}</div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post">
      <label for="username">Логин</label>
      <input id="username" name="username" autocomplete="username" required>

      <label for="password">Пароль</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required>

      <button type="submit">Войти</button>
    </form>
  </div>
</body>
</html>
